name: Build StreamIQ AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.9 --distribution-type bin
          chmod +x ./gradlew

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias streamiq \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore streamiq.keystore \
            -storepass streamiq123 \
            -keypass streamiq123 \
            -dname "CN=StreamIQ, OU=App, O=StreamIQ, L=City, S=State, C=IN" \
            -noprompt

      - name: Build Signed Release AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/streamiq.keystore \
            -Pandroid.injected.signing.store.password=streamiq123 \
            -Pandroid.injected.signing.key.alias=streamiq \
            -Pandroid.injected.signing.key.password=streamiq123 \
            --stacktrace

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: StreamIQ-release
          path: app/build/outputs/bundle/release/app-release.aab
